<!-- HEADER + NAVBAR -->

  <nav class="nav" id="main-nav">

      </div>-->

  <button class="nav-toggle" aria-label="Toggle menu"

<!-- PAGE TITLE -->

  <main class="page">
    <header class="page-header">
      <h1>Contact</h1>
      <p class="subtitle">Get in touch</p>
    </header>

    <p style="color: var(--text-secondary);">
      Suggestions, collabs, or general questions about
      Renascent or Brumous Studios.
    </p>

<!-- LINKS -->

    <div class="contact-links">

      <a href="mailto:dev@brumous.fi" class="contact-link">
        <span class="contact-link-label">Email</span>
        <span class="contact-link-value">dev@brumous.fi</span>
      </a>

      <a href="https://twitter.com/BrumousStudios" target="_blank" rel="noopener" class="contact-link">
        <span class="contact-link-label">Twitter / X</span>
        <span class="contact-link-value">@BrumousStudios</span>
      </a>

      <a href="https://youtube.com/@BrumousStudios" target="_blank" rel="noopener" class="contact-link">
        <span class="contact-link-label">YouTube</span>
        <span class="contact-link-value">@BrumousStudios</span>
      </a>

      <!-- Uncomment when Ko-fi is set up
      <a href="https://ko-fi.com/brumousstudios" target="_blank" rel="noopener" class="contact-link">
        <span class="contact-link-label">Ko-fi</span>
        <span class="contact-link-value">ko-fi.com/brumousstudios</span>
      </a>
      -->

    </div>
  </main>

      <i class="fa-brands fa-square-instagram"></i>
      <a href="mailto:dev@brumous.fi"><i class="fa-solid fa-envelope"></i></a>
    </div>
  </div>
