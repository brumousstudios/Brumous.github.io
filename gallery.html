<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gallery — Brumous Studios / Renascent screenshots and artwork." />
  <title>Gallery — Brumous Studios</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="nav">
    <a href="https://brumous.fi" class="nav-logo">
      <img src="img/logo_horizontal.png" alt="Brumous Studios" />
      <!--<div class="nav-logo-text">
        Brumous
        <span>Studios</span>
      </div>-->
    </a>
    <button class="nav-toggle" aria-label="Toggle menu"
      onclick="this.nextElementSibling.classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="blog">Devblog</a></li>
      <li><a href="renascent">Renascent</a></li>
      <li><a href="gallery" class="active">Gallery</a></li>
      <li><a href="contact">Contact</a></li>
    </ul>
  </nav>

  <main class="page" style="max-width: 1100px;">
    <header class="page-header">
      <h1>Gallery</h1>
      <p class="subtitle">Screenshots &amp; artwork — Renascent</p>
    </header>

    <!--
      To add images:
      1. Put image files in a folder called gallery/ next to this file
      2. Copy a .gallery-item block below
      3. Update src, alt, and caption
    -->

    <div class="gallery-grid">

      <!-- Example — replace with your actual images -->
      <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
        <img src="gallery/placeholder.jpg" alt="Oathwell concept art" />
        <div class="gallery-item-caption">Oathwell concept</div>
      </div>

    </div>
  </main>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕ Close</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <footer class="footer">
    Brumous Studios &copy; 2026
  </footer>

  <script>
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
