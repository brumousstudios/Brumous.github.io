<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gallery — Brumous Studios / Renascent screenshots and artwork." />
  <meta property="og:url" content="brumous.fi/gallery" />
  <meta property="og:type" content="website" />
  <meta name="title" property="og:title" content="Brumous Studios - Gallery" />
  <meta name="image" property="og:image" content="https://brumous.fi/linkpreview.png"/>
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1024">
  <meta property="og:image:height" content="1024">
  <meta name="twitter:card" content="Gallery — Brumous Studios / Renascent screenshots and artwork." />
  <meta name="twitter:site" description="@BrumousStudios" />
  <meta name="twitter:title" content="Brumous Studios - Gallery" />
  <meta name="twitter:description" content="Gallery — Brumous Studios / Renascent screenshots and artwork." />
  <meta name="twitter:image:src" content="https://brumous.fi/linkpreview.png">
  <meta name="twitter:domain" content="brumous.fi/gallery">
  <title>Gallery - Brumous Studios</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico?" />
</head>
<body>

  <!-- HEADER + NAVBAR -->

  <nav class="nav" id="main-nav">
  <a href="https://brumous.fi" class="nav-logo">
    <img src="https://brumous.fi/img/logo_horizontal.png" alt="Brumous Studios" />
     <!-- <div class="nav-logo-text">
        Brumous
        <span>Studios</span>
      </div>-->
  </a>
  <button class="nav-toggle" aria-label="Toggle menu"
    onclick="document.querySelector('#main-nav .nav-links').classList.toggle('open')">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links">
    <li><a href="/devlog/">Devlog</a></li>
    <li><a href="/renascent">Renascent</a></li>
    <li><a href="/gallery">Gallery</a></li>
    <li><a href="/contact">Contact</a></li>
  </ul>
</nav>

<!-- PAGE TITLE -->

  <main class="page" style="max-width: 1100px;">
    <header class="page-header">
      <h1>Gallery</h1>
      <p class="subtitle">Screenshots &amp; artwork — Renascent</p>
    </header>

<!-- GALLERY BOXES -->

    <div class="gallery-grid">

      <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
        <img src="img/gallery_assets_oathwell.jpg" alt="3D environmental assets in blender" />
        <div class="gallery-item-caption">Oathwell environment assets (first custom assets wooo)</div>
      </div>
      <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
        <img src="img/gallery_first_npc.jpg" alt="NPC rigged model in blender" />
        <div class="gallery-item-caption">First NPC, eager to yap some wisdom</div>
      </div>
      <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
        <img src="img/gallery_first_playercharacter.jpg" alt="player character model rigged in blender ready for unreal engine 5" />
        <div class="gallery-item-caption">First player character model</div>
      </div>

    </div>
  </main>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="event.stopPropagation(); closeLightbox()">✕ Close</button>
    <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()" />
  </div>

<!-- FOOTER -->

  <footer class="footer">
  <div class="footer-inner">
    <span>Brumous Studios &copy; 2026</span>
    <div class="footer-links">
      <a href="https://twitter.com/BrumousStudios" target="_blank" rel="noopener" aria-label="Twitter">
        <i class="fa-brands fa-square-x-twitter"></i>
      </a>
      <a href="https://youtube.com/@BrumousStudios" target="_blank" rel="noopener" aria-label="YouTube">
        <i class="fa-brands fa-youtube"></i>
      </a>
          <a href="https://www.instagram.com/brumousstudios/" target="_blank" rel="noopener" aria-label="Instagram">
      <i class="fa-brands fa-square-instagram"></i>
      <a href="mailto:dev@brumous.fi"><i class="fa-solid fa-envelope"></i></a>
    </div>
  </div>
</footer>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="/js/components.js"></script>
  <script>
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
