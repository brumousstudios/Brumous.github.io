<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gallery — Brumous Studios / Renascent screenshots and artwork." />
  <meta property="og:url" content="brumous.fi/gallery" />
  <meta property="og:type" content="website" />
  <meta name="title" property="og:title" content="Brumous Studios - Gallery" />
  <meta name="image" property="og:image" content="https://brumous.fi/linkpreview.png"/>
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1024">
  <meta property="og:image:height" content="1024">
  <meta name="twitter:card" content="Gallery — Brumous Studios / Renascent screenshots and artwork." />
  <meta name="twitter:site" description="@BrumousStudios" />
  <meta name="twitter:title" content="Brumous Studios - Gallery" />
  <meta name="twitter:description" content="Gallery — Brumous Studios / Renascent screenshots and artwork." />
  <meta name="twitter:image:src" content="https://brumous.fi/linkpreview.png">
  <meta name="twitter:domain" content="brumous.fi/gallery">
  <title>Gallery - Brumous Studios</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/x-icon" href="favicon.ico?" />
</head>
<body>

  <div id="nav-placeholder"></div>
  
  <main class="page" style="max-width: 1100px;">
    <header class="page-header">
      <h1>Gallery</h1>
      <p class="subtitle">Screenshots &amp; artwork — Renascent</p>
    </header>

    <!--
      To add images:
      1. Put image files in a folder called gallery/ next to this file
      2. Copy a .gallery-item block below
      3. Update src, alt, and caption
    -->

    <div class="gallery-grid">

      <!-- Example — replace with images -->
      <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
        <img src="img/gallery_assets_oathwell.jpg" alt="IMG not found, must've been the wind..." />
        <div class="gallery-item-caption">Oathwell environment assets (first custom assets wooo)</div>
      </div>
      <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
        <img src="img/gallery_first_npc.jpg" alt="IMG not found, must've been the wind..." />
        <div class="gallery-item-caption">First NPC, eager to yap some wisdom</div>
      </div>
      <div class="gallery-item" onclick="openLightbox(this.querySelector('img').src)">
        <img src="img/gallery_first_playercharacter.jpg" alt="IMG not found, must've been the wind..." />
        <div class="gallery-item-caption">First player character model</div>
      </div>

    </div>
  </main>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕ Close</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <div id="footer-placeholder"></div>
  <script src="/js/components.js"></script>

  <script>
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
